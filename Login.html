<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - SIA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4e73df, #224abe);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 380px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }

        .sub-title {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #4e73df;
            box-shadow: 0 0 5px rgba(78,115,223,0.5);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #4e73df;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #224abe;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .register-link a {
            color: #4e73df;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #777;
        }

        .alert {
            background-color: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #f5c6cb;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Login SIA</h2>
        <div class="sub-title">Sistem Informasi Akademik</div>

        <div class="alert" id="errorAlert">
            Username dan password harus diisi!
        </div>
        
        <div class="alert alert-success" id="successAlert" style="display: none;">
            Registrasi berhasil! Silakan login.
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>Username / NIM</label>
                <input type="text" id="username" name="username" placeholder="Masukkan username" value="">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" name="password" placeholder="Masukkan password" value="">
            </div>

            <button type="submit" class="btn-submit">
                Login
            </button>

            <div class="register-link">
                Belum punya akun? <a href="register.html">Daftar disini</a>
            </div>

            <div class="footer-text">
                © 2026 Sistem Informasi Akademik
            </div>
        </form>
    </div>

    <script>
        // Cek apakah ada pesan sukses dari registrasi
        window.onload = function() {
            const registered = sessionStorage.getItem('registered');
            if (registered === 'success') {
                document.getElementById('successAlert').style.display = 'block';
                // Hapus pesan setelah ditampilkan
                setTimeout(() => {
                    document.getElementById('successAlert').style.display = 'none';
                    sessionStorage.removeItem('registered');
                }, 3000);
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (username === '' || password === '') {
                const alert = document.getElementById('errorAlert');
                alert.classList.add('show');
                
                setTimeout(() => {
                    alert.classList.remove('show');
                }, 3000);
            } else {
                // Ambil data user dari localStorage
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const user = users.find(u => u.username === username && u.password === password);
                
                if (user) {
                    // Login berhasil
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('username', username);
                    sessionStorage.setItem('fullname', user.fullname);
                    sessionStorage.setItem('nim', user.nim);
                    
                    window.location.href = 'dashboard.html';
                } else {
                    // Cek apakah user ada tapi password salah
                    const userExists = users.find(u => u.username === username);
                    if (userExists) {
                        alert('Password salah!');
                    } else {
                        alert('Username tidak ditemukan!');
                    }
                }
            }
        }
    </script>

</body>
</html>
